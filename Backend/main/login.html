<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EcoRastro | Formulario de Huerta</title>

  <!-- Tipografías -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="assets/css/ecorastro-ui.css">
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <label class="er-field">
        <span class="er-label">Superficie aproximada (m²)
        </span>
        <select class="er-input" name="area">
            <option value="">Seleccione una opción</option>
            <option value="20">20 m² (Pequeño)</option>
            <option value="50">50 m² (Mediano)</option>
            <option value="100">100 m² (Grande)</option>
            <option value="150">150 m² (Muy grande)</option>
            <option value="200">200 m² o más</option>
        </select>
    </label>
  <!-- FOOTER -->
  <footer>
    <p>© 2025 EcoRastro - Conectando comunidades 🌱</p>
  </footer>
</body>
</html>
