<!--INDICATIVO DE ELEMENTOS-->
<h2>¿Cuál es su situación?</h2>
<div class="bg-dark text-secondary px-4 py-5 text-center">
    <div class="py-5"> 
         <div class="col-lg-6 mx-auto">
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <button type="button" class="btn btn-outline-info btn-lg px-4 me-sm-3 fw-bold">
                    Abandonado
                </button> 
                <button type="button" class="btn btn-outline-light btn-lg px-4">
                    En adopción
                </button> 
            </div></div> </div> </div>
<br>
<!--GENERO DEL ANIMAL-->
<h2>¿Cuál es su genero?</h2>
<div class="bg-dark text-secondary px-4 py-5 text-center">
    <div class="py-5"> 
         <div class="col-lg-6 mx-auto">
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <button type="button" class="btn btn-outline-info btn-lg px-4 me-sm-3 fw-bold">
                    Masculino
                </button> 
                <button type="button" class="btn btn-outline-light btn-lg px-4">Femenino
                    </button> 
            </div></div> </div> </div>
<br>
<!--INGRESO IMAGENES-->
<form method="post" action="/send/" enctype="multipart/form-data">
    Ingresa Imagenes del animal
  <input type="file" accept="image/*" multiple>
</form>
<!--SECCION NOMBRE DE ANIMAL-->
<label class="switch">
    <h2>¿Responde a un nombre?</h2>
  <input type="checkbox">
  <span class="slider round"></span>
    <div class="button">
    <input type="text" placeholder="Ingresa nombre" name="uname" required>
    </div>
</label>
<br>
<!--SECCION UBICACIÓN-->
<label>
<h2>¿Utilizamos tú ubicación actual?</h2>
  <input type="checkbox">
  <span class="slider round"></span>
    <div class="button">
    <input type="text" placeholder="Ingresa dirección" name="uname" required>
</label>
<br>
<!--SECCION LESIONES-->
<label>
<h2>¿Visualizas lesiones??</h2>
  <input type="checkbox">
  <span class="slider round"></span>
    <div class="button">
    <input type="text" placeholder="Describa..." name="uname" required>
</label>
<br>
<!--CONDICIONES DE COMPORTAMIENTO-->
<h2>¿Qué comportamiento tiene con otros humanos y animales?</h2>
