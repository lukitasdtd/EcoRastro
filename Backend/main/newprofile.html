<h1 id="form-title" class="er-title">Formulario Creacion Perfil</h1>

      <!-- Datos principales -->
      <section class="er-section" aria-labelledby="s-datos">
        <h2 id="s-datos" class="er-section__title">Datos principales</h2>

        <div class="er-grid-2">
          <label class="er-field">
            <span class="er-label">Nombre*</span>
            <input class="er-input" type="text" name="name" required placeholder="Ej. Isabela">
          </label>

        <div class="er-grid-2">
          <label class="er-field">
            <span class="er-label">Apellidos*</span>
            <input class="er-input" type="text" name="secondname" required placeholder="Ej. Gonzalez">
          </label>

        <div class="er-grid-2">
          <label class="er-field">
            <span class="er-label">Rut/Run*</span>
            <input class="er-input" type="text" name="rut" required placeholder="Ej. xx.xxx.xxx-x">
          </label>

        <div class="er-grid-2">
          <label class="er-field">
            <span class="er-label">Email*</span>
            <input class="er-input" type="text" name="mail" required placeholder="Ej. xx.xxx.xxx-x">
          </label>  
                <div class="er-grid-2">
          <label class="er-field">
            <span class="er-label">Contraseña*</span>
            <input class="er-input" type="text" name="psswrd">
          </label>

      <!-- Foto Perfil -->
      <section class="er-section" aria-labelledby="s-fotos">
        <h2 id="s-fotos" class="er-section__title">Foto</h2>

        <div class="er-grid-3">
          <div class="er-uploader" data-uploader>
            <img class="er-uploader__preview" alt="">
            <input type="file" accept="image/*">
            <div class="er-uploader__hint">Subir imagen</div>
          </div>
        <p class="er-note">Formatos JPG/PNG.</p>
      </section>

      <!-- Acciones -->
      <div class="er-actions">
        <button class="er-btn er-btn--primary" type="button" id="SaveBtn">Crear</button>
      </div>

    </article>
