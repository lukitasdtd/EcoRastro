<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRastro - Mapa</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Fuente Quicksand -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/mapa.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container-fluid px-4">

      <!-- Logo -->
      <a class="navbar-brand fw-bold text-success d-flex align-items-center" href="index.html">
        🌱 <span class="ms-2">EcoRastro</span>
      </a>

      <!-- Botón de hamburguesa -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Contenido -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <!-- Buscador -->
        <form class="d-flex mx-lg-auto my-3 my-lg-0 search-form" role="search">
          <input class="form-control search-input" type="search" placeholder="🔍 Buscar..." aria-label="Buscar">
        </form>

        <!-- Menú -->
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">🏠 <span class="d-none d-lg-inline">Inicio</span></a></li>
          <li class="nav-item"><a class="nav-link" href="calendario.html">📅 <span class="d-none d-lg-inline">Calendario de siembra</span></a></li>
          <li class="nav-item"><a class="nav-link" href="educacion.html">📖 <span class="d-none d-lg-inline">Sección Educativa</span></a></li>
          <li class="nav-item"><a class="nav-link active" href="mapa.html">🗺️ <span class="d-none d-lg-inline">Mapa</span></a></li>
          <!-- Icono usuario -->
          <li class="nav-item ms-lg-3">
            <a class="nav-link p-0" href="login.html">
              <img src="img/user-icon.png"  class="user-icon" width="28">
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="container-fluid my-4">
    <div class="row g-4">

      <!-- Columna izquierda (cards) -->
      <div class="col-lg-4 d-flex flex-column gap-4">

        <!-- Card Filtros -->
        <div class="card shadow-sm">
          <div class="card-header bg-success fw-bold">🔎 Filtros</div>
          <div class="card-body">
            <form id="filtros-form">
              <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select id="categoria-filtro" class="form-select">
                  <option value="">Todas</option>
                  <option value="mascota">Mascotas</option>
                  <option value="huerta">Huertas</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Tipo de mascota</label>
                <select id="tipo-filtro" class="form-select">
                  <option value="">Todas</option>
                  <option value="perro">Perros</option>
                  <option value="gato">Gatos</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Distancia</label>
                <select id="distancia-filtro" class="form-select">
                  <option value="5">5 km</option>
                  <option value="10">10 km</option>
                  <option value="20">20 km</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success w-100">Aplicar</button>
            </form>
          </div>
        </div>

        <!-- Card Lugares cercanos -->
        <div class="card shadow-sm">
          <div class="card-header lugares-header fw-bold">📍 Lugares cercanos</div>
          <div class="card-body">
            <ul class="list-group list-group-flush" id="lista-lugares"></ul>
          </div>
        </div>

        <!-- Card Publicar -->
        <div class="card shadow-sm">
          <div class="card-header publicar-header fw-bold">➕ Publicar</div>
          <div class="card-body text-center">
            <p class="mb-3">¿Quieres compartir tu huerta o reportar una mascota?</p>
            <a href="publicar.html" class="btn btn-success">Publicar ahora</a>
          </div>
        </div>
      </div>

      <!-- Columna derecha (mapa) -->
      <div class="col-lg-8">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-primary text-white fw-bold">🗺️ Mapa Interactivo</div>
          <div class="card-body p-0">
            <div id="map"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 EcoRastro - Conectando comunidades 🌱</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- JS propio -->
  <script src="js/mapa.js"></script>
</body>
</html>
